# Intrinsic calibration for the BA overview camera (Logitech C930e @ 640x480,
# YUYV passthrough). Produced by ROS2 `camera_calibration` (cameracalibrator),
# captured on the WSL2 laptop subscribing to
#   /ba_overview_camera/image_raw/compressed
#
# camera_name must match what v4l2_camera_node reports to the
# camera_info_manager, otherwise the manager logs
#     [<device_name>] does not match <yaml_name> in file ...
# on every startup. v4l2_camera_node (0.6.x) derives this name from the USB
# product string and does NOT honour a `camera_name` ROS parameter, so the
# value below is the device-derived name, not a role name like
# "ba_overview_camera". If you swap to a different webcam, this mismatch is
# the expected signal that the intrinsics no longer apply and you need to
# re-calibrate.
#
# If you re-calibrate: overwrite this file, keep the camera_name line.
image_width: 640
image_height: 480
camera_name: logitech_webcam_c930e
camera_matrix:
  rows: 3
  cols: 3
  data: [518.94459,   0.     , 340.04769,
           0.     , 518.92238, 238.39717,
           0.     ,   0.     ,   1.     ]
distortion_model: plumb_bob
distortion_coefficients:
  rows: 1
  cols: 5
  data: [0.099076, -0.180363, -0.005432, 0.006058, 0.000000]
rectification_matrix:
  rows: 3
  cols: 3
  data: [1., 0., 0.,
         0., 1., 0.,
         0., 0., 1.]
projection_matrix:
  rows: 3
  cols: 4
  data: [523.50983,   0.     , 343.86162,   0.     ,
           0.     , 526.76935, 235.79931,   0.     ,
           0.     ,   0.     ,   1.     ,   0.     ]
