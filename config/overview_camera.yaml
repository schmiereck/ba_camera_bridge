# Parameters for the overview v4l2_camera_node.
#
# The wildcard key "/**" matches any node loaded with this file, so the
# same YAML stays valid if the launch file changes namespace or node name.
/**:
  ros__parameters:
    video_device: "/dev/video0"
    pixel_format: "YUYV"
    # Pass the native YUYV buffer through unchanged. Using "rgb8" triggers a
    # YUV->RGB conversion in v4l2_camera_node ("possibly slow conversion")
    # and wastes CPU, since image_transport/compressed only needs to JPEG-
    # encode the frame afterwards anyway.
    output_encoding: "yuv422_yuy2"
    image_size: [640, 480]
    # time_per_frame = [numerator, denominator] -> [1, 10] = 10 fps. Note:
    # on v4l2_camera 0.6.x this parameter is not always honoured and the
    # camera may still run at its native default rate; treat it as a hint.
    time_per_frame: [1, 10]
    camera_frame_id: "overview_camera_link"
    # Intrinsics from `camera_calibration` / cameracalibrator, stored in the
    # package under config/. The `camera_name` must match the `camera_name`
    # field inside that YAML or camera_info_manager logs a warning and falls
    # back to an empty CameraInfo.
    camera_name: "ba_overview_camera"
    camera_info_url: "package://ba_camera_bridge/config/overview_camera_info.yaml"
