# Parameters for the overview v4l2_camera_node.
#
# The wildcard key "/**" matches any node loaded with this file, so the
# same YAML stays valid if the launch file changes namespace or node name.
/**:
  ros__parameters:
    video_device: "/dev/video0"
    pixel_format: "YUYV"
    # Use "rgb8" to ensure the compressed image transport plugin 
    # receives a format it can correctly encode in color.
    output_encoding: "rgb8"
    image_size: [640, 480]
    # [1, 5] = 5 fps. Lowering this to reduce network congestion.
    time_per_frame: [1, 5]
    camera_frame_id: "overview_camera_link"
    # Intrinsics from `camera_calibration` / cameracalibrator, stored in the
    # package under config/. Note: v4l2_camera_node 0.6.x has no `camera_name`
    # ROS parameter — it derives the name from the USB product string — so
    # the matching is done on the YAML side (see comment in that file).
    camera_info_url: "package://ba_camera_bridge/config/overview_camera_info.yaml"
